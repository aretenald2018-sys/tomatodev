<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>아이소메트릭 픽셀 라이프존 목업</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, .08), transparent 32%),
        #10131d;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      letter-spacing: 0;
    }

    .mockup-shell {
      width: min(100vw, 1672px);
      padding: 0;
    }

    .scene {
      position: relative;
      overflow: hidden;
      width: 100%;
      aspect-ratio: 1672 / 941;
    }

    .pixel-art {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: auto;
    }

    .actor-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .actor {
      position: absolute;
      left: calc(var(--x) / 1672 * 100%);
      top: calc(var(--y) / 941 * 100%);
      z-index: var(--z);
      width: calc(var(--w) / 1672 * 100%);
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .controls {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 100;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 8px;
      background: rgba(10, 12, 18, .78);
      backdrop-filter: blur(8px);
    }

    .controls button {
      min-width: 54px;
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 6px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, .08);
      color: #fff;
      font: 700 13px/1 "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      letter-spacing: 0;
      cursor: pointer;
    }

    .controls button[aria-pressed="true"] {
      border-color: rgba(255, 255, 255, .6);
      background: rgba(255, 255, 255, .22);
    }

    .sr-only {
      position: absolute;
      overflow: hidden;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      border: 0;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main class="mockup-shell">
    <section class="scene" aria-label="동적 캐릭터 배치가 가능한 아이소메트릭 픽셀 라이프존">
      <img
        class="pixel-art"
        src="../assets/home/life-zone/base-room-alpha.png"
        width="1672"
        height="941"
        alt="사람이 없는 아이소메트릭 픽셀 라이프존 배경. 왼쪽은 벤치프레스, 랫풀다운, 스쿼트랙이 있는 웨이트존이고, 가운데는 도시락과 샐러드를 먹는 아일랜드 식사존이며, 오른쪽은 여러 컴퓨터와 의자가 있는 업무존이다."
      >
      <div class="actor-layer" id="actor-layer" aria-hidden="true"></div>
    </section>
    <nav class="controls" aria-label="목업 상태 전환">
      <button type="button" data-mode="workout" aria-pressed="true">운동</button>
      <button type="button" data-mode="diet" aria-pressed="false">식사</button>
      <button type="button" data-mode="office" aria-pressed="false">업무</button>
      <button type="button" data-mode="mixed" aria-pressed="false">혼합</button>
    </nav>
    <p class="sr-only">
      벤치프레스, 랫풀다운, 스쿼트 머신이 있는 운동존과 아일랜드, 도시락, 샐러드가 있는 식사존,
      컴퓨터와 의자에 앉아 일하는 업무존을 하나의 2대1 아이소메트릭 픽셀아트 공간으로 구성한 HTML 목업입니다.
    </p>
  </main>
  <script>
    const actorBase = "../assets/home/life-zone/sprites/";
    const actors = [
      { id: "jups", name: "줍스" },
      { id: "moonjung-tomato", name: "문정토마토" },
      { id: "lee-jaeheon", name: "이재헌" }
    ];

    const slots = {
      workout: [
        { pose: "workout-lat", x: 246, y: 260, w: 238, z: 30 },
        { pose: "workout-bench", x: 70, y: 540, w: 260, z: 42 },
        { pose: "workout-squat", x: 500, y: 245, w: 214, z: 26 }
      ],
      diet: [
        { pose: "diet-left", x: 548, y: 548, w: 142, z: 58 },
        { pose: "diet-center", x: 678, y: 610, w: 136, z: 64 },
        { pose: "diet-right", x: 878, y: 558, w: 132, z: 60 }
      ],
      office: [
        { pose: "office-upper", x: 1190, y: 382, w: 154, z: 46 },
        { pose: "office-center", x: 1394, y: 486, w: 148, z: 52 },
        { pose: "office-lower", x: 1316, y: 610, w: 152, z: 66 }
      ]
    };

    const modes = {
      workout: ["workout", "workout", "workout"],
      diet: ["diet", "diet", "diet"],
      office: ["office", "office", "office"],
      mixed: ["workout", "diet", "office"]
    };

    const layer = document.getElementById("actor-layer");
    const buttons = Array.from(document.querySelectorAll("[data-mode]"));

    function render(mode) {
      const slotIndex = { workout: 0, diet: 0, office: 0 };
      layer.textContent = "";
      actors.forEach((actor, index) => {
        const state = modes[mode][index];
        const slot = slots[state][slotIndex[state]++];
        const image = document.createElement("img");
        image.className = "actor";
        image.src = `${actorBase}${actor.id}-${slot.pose}.png`;
        image.alt = "";
        image.style.setProperty("--x", slot.x);
        image.style.setProperty("--y", slot.y);
        image.style.setProperty("--w", slot.w);
        image.style.setProperty("--z", slot.z);
        layer.append(image);
      });

      buttons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.mode === mode));
      });
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => render(button.dataset.mode));
    });

    render("workout");
  </script>
</body>
</html>
