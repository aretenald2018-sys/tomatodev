name: Verify Pages Runtime Assets

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-runtime-assets"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify project governance
        run: node scripts/check-project-governance.mjs

      - name: Verify generated CSS
        run: node scripts/generate-style-entry.mjs --check

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Verify runtime assets
        run: node scripts/verify-runtime-assets.mjs

      - name: Generate build info
        run: node scripts/generate-build-info.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
