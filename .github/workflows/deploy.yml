name: Deploy TomatoDev Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "tomatodev-pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.repository == 'aretenald2018-sys/tomatodev' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Configure Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Install web dependencies
        run: npm ci

      - name: Build TomatoDev Android web assets
        run: npm run cap:sync

      - name: Build TomatoDev debug APK
        run: gradle -p android :app:assembleDebug

      - name: Stage TomatoDev APK download
        run: |
          mkdir -p public/downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk public/downloads/tomatodev.apk

      - name: Verify project governance
        run: node scripts/check-project-governance.mjs

      - name: Verify development repository boundary
        run: node scripts/check-repository-boundary.mjs

      - name: Verify generated CSS
        run: node scripts/generate-style-entry.mjs --check

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Verify runtime assets
        run: node scripts/verify-runtime-assets.mjs

      - name: Generate build info
        run: node scripts/generate-build-info.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
